<h1>RadioWave FM – Online rádió</h1>

<section class="hero">
    <p>Non-stop zene, élő műsorok, interjúk – hallgasd a RadioWave FM-et bárhonnan!</p>
</section>

<section class="videos">
    <h2>Promo videók</h2>

    <div class="video-grid">
        <!-- Saját, max 5 mp-es videó -->
        <figure>
            <video controls width="320">
                <source src="public/video/promo.mp4" type="video/mp4">
                
            </video>
            <figcaption>RadioWave FM – rövid promo</figcaption>
        </figure>

        <!-- YouTube beágyazás -->
        <figure>
            <iframe width="320" height="180"
                    src="https://www.youtube.com/embed/watch?v=dQw4w9WgXcQ"
                    title="YouTube video player"
                    frameborder="0"
                    allowfullscreen></iframe>
            <figcaption>Stúdió hangulat – YouTube videó</figcaption>
        </figure>
    </div>
</section>

<section class="map">
    <h2>Stúdiónk helye</h2>
    <p>RadioWave FM stúdió – Budapest, Példa utca 1.</p>
    <div class="map-container">
        <iframe
            src="https://www.google.com/maps/embed?pb=..."
            width="600" height="450" style="border:0;"
            allowfullscreen="" loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
</section>
